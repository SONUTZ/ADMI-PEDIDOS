<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Liam's Pizza Lab · Panel del propietario</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Pacifico&family=Anton&family=Work+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap');

:root{
  --black:#0B0A09;
  --surface:#171411;
  --surface-2:#1F1B16;
  --cream:#EFE2CF;
  --cream-dim:#C7B89C;
  --paper:#FFFDF6;
  --ink:#2A1F16;
  --red:#D1402C;
  --red-dark:#9A2C1D;
  --line:rgba(239,226,207,.16);
  --font-script:'Pacifico',cursive;
  --font-display:'Anton',sans-serif;
  --font-body:'Work Sans',sans-serif;
  --font-mono:'JetBrains Mono',monospace;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  font-family:var(--font-body);
  background:var(--black);
  color:var(--cream);
  min-height:100vh;
}
img{max-width:100%;display:block;}
button{font-family:inherit;cursor:pointer;}

/* ---------- LOGIN ---------- */
#login-screen{
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  padding:24px;
  text-align:center;
  gap:14px;
}
#login-screen img{
  width:120px;height:120px;border-radius:50%;
  object-fit:cover;
  box-shadow:0 0 0 2px var(--red), 0 0 0 6px var(--black);
}
#login-screen h1{
  font-family:var(--font-display);
  font-weight:400;
  text-transform:uppercase;
  letter-spacing:.03em;
  font-size:22px;
  margin:6px 0 0;
}
#login-screen p{
  color:var(--cream-dim);
  font-size:13px;
  font-family:var(--font-mono);
  margin:0 0 10px;
}
#login-form{
  display:flex;
  flex-direction:column;
  gap:10px;
  width:100%;
  max-width:280px;
}
#login-form input{
  padding:11px 12px;
  border:1px solid var(--line);
  border-radius:4px;
  background:var(--surface-2);
  color:var(--cream);
  font-size:15px;
  text-align:center;
}
#login-form button{
  background:var(--red);
  color:var(--cream);
  border:none;
  padding:12px;
  border-radius:4px;
  font-family:var(--font-display);
  font-weight:400;
  letter-spacing:.03em;
  text-transform:uppercase;
  font-size:15px;
}
#login-form button:hover{background:var(--red-dark);}
#login-error{
  color:var(--red);
  font-size:12.5px;
  min-height:16px;
}

/* ---------- PANEL ---------- */
#panel-screen{display:none;}
header.admin-top{
  background:var(--surface);
  border-bottom:1px solid var(--line);
  padding:18px 5vw;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:14px;
  flex-wrap:wrap;
}
.admin-brand{display:flex;align-items:center;gap:12px;}
.admin-brand img{width:46px;height:46px;border-radius:50%;object-fit:cover;box-shadow:0 0 0 2px var(--red);}
.admin-brand h1{
  font-family:var(--font-display);
  font-weight:400;
  text-transform:uppercase;
  letter-spacing:.02em;
  font-size:16px;
  margin:0;
}
.admin-actions{display:flex;gap:10px;flex-wrap:wrap;}
.btn-ghost{
  background:transparent;
  color:var(--cream);
  border:1px solid var(--line);
  padding:9px 14px;
  border-radius:4px;
  font-size:13px;
}
.btn-ghost:hover{border-color:var(--red);color:var(--red);}
.btn-solid{
  background:var(--red);
  color:var(--cream);
  border:none;
  padding:9px 14px;
  border-radius:4px;
  font-size:13px;
  font-weight:600;
}
.btn-solid:hover{background:var(--red-dark);}

main.admin-main{
  max-width:1000px;
  margin:0 auto;
  padding:28px 5vw 70px;
}
#status-msg{
  font-family:var(--font-mono);
  font-size:13px;
  color:var(--cream-dim);
  margin-bottom:16px;
}
.order-list{display:flex;flex-direction:column;gap:12px;}
.order-card{
  background:var(--surface);
  border:1px solid var(--line);
  border-radius:6px;
  padding:16px 18px;
  display:flex;
  justify-content:space-between;
  gap:14px;
  flex-wrap:wrap;
  align-items:center;
}
.order-info{flex:1;min-width:220px;}
.order-top{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:4px;}
.order-ticket{
  font-family:var(--font-mono);
  font-weight:700;
  color:var(--red);
  font-size:13.5px;
}
.order-time{
  font-family:var(--font-mono);
  font-size:12px;
  color:var(--cream-dim);
}
.order-customer{font-weight:600;font-size:15px;}
.order-detail{font-size:12.5px;color:var(--cream-dim);margin-top:4px;line-height:1.4;}
.order-total{
  font-family:var(--font-mono);
  font-weight:700;
  font-size:17px;
  color:var(--cream);
  white-space:nowrap;
}
.order-type-badge{
  font-family:var(--font-mono);
  font-size:10.5px;
  text-transform:uppercase;
  letter-spacing:.05em;
  padding:3px 8px;
  border-radius:3px;
  background:rgba(209,64,44,.15);
  color:var(--red);
}
.empty-state{
  text-align:center;
  padding:60px 20px;
  color:var(--cream-dim);
  font-family:var(--font-mono);
  font-size:13px;
}

/* ---------- TICKET MODAL (idéntico al de pedidos.html) ---------- */
.overlay{
  position:fixed;inset:0;
  background:rgba(11,10,9,.82);
  display:none;
  align-items:center;justify-content:center;
  padding:24px;
  z-index:50;
}
.overlay.show{display:flex;}
.ticket-wrap{max-height:90vh;overflow-y:auto;display:flex;flex-direction:column;align-items:center;}
.ticket{
  width:320px;
  background:var(--paper);
  font-family:var(--font-mono);
  color:var(--ink);
  padding:22px 22px 30px;
  position:relative;
  clip-path:polygon(
    0% 2%, 4% 0%, 8% 2%, 12% 0%, 16% 2%, 20% 0%, 24% 2%, 28% 0%, 32% 2%, 36% 0%, 40% 2%, 44% 0%, 48% 2%, 52% 0%, 56% 2%, 60% 0%, 64% 2%, 68% 0%, 72% 2%, 76% 0%, 80% 2%, 84% 0%, 88% 2%, 92% 0%, 96% 2%, 100% 0%,
    100% 98%, 96% 100%, 92% 98%, 88% 100%, 84% 98%, 80% 100%, 76% 98%, 72% 100%, 68% 98%, 64% 100%, 60% 98%, 56% 100%, 52% 98%, 48% 100%, 44% 98%, 40% 100%, 36% 98%, 32% 100%, 28% 98%, 24% 100%, 20% 98%, 16% 100%, 12% 98%, 8% 100%, 4% 98%, 0% 100%
  );
  box-shadow:0 18px 40px rgba(0,0,0,.5);
}
.ticket img.t-logo{
  width:64px;height:64px;border-radius:50%;object-fit:cover;
  display:block;margin:0 auto 8px;border:2px solid var(--ink);
}
.ticket h3.t-brand{
  font-family:var(--font-script);
  font-size:24px;margin:0 0 2px;text-align:center;color:var(--ink);
}
.ticket .t-sub{font-size:10.5px;text-align:center;color:#7a6c54;margin-bottom:12px;}
.t-dots{border-top:1px dashed #b9ab8e;margin:12px 0;}
.t-row{display:flex;justify-content:space-between;font-size:12px;margin:3px 0;}
.t-item-block{font-size:12px;margin:8px 0;white-space:pre-line;}
.t-total{font-size:16px;font-weight:700;display:flex;justify-content:space-between;margin-top:6px;}
.t-foot{text-align:center;font-size:11px;margin-top:14px;color:#7a6c54;}
.t-foot img{width:50px;height:50px;border-radius:50%;object-fit:cover;margin:0 auto 6px;box-shadow:0 0 0 3px #d1402c;}
.t-num{text-align:center;font-size:13px;font-weight:700;letter-spacing:.06em;margin-top:4px;}
.ticket-actions{margin-top:18px;display:flex;gap:10px;}
.ticket-actions button{border:none;border-radius:3px;padding:11px 18px;font-weight:600;font-size:13.5px;}
.btn-print{background:var(--red);color:var(--cream);}
.btn-close{background:var(--paper);color:var(--ink);border:1px solid var(--ink) !important;}

@media print{
  @page{ size: 80mm auto; margin: 0; }
  html, body{ width:80mm; height:auto !important; margin:0; padding:0; }
  body *{visibility:hidden;}
  .overlay, .overlay *{visibility:visible;}
  .overlay{
    position:static;
    inset:auto;
    background:#fff;
    padding:0;
    display:block;
    height:auto;
    width:80mm;
  }
  .ticket-wrap{
    max-height:none;
    overflow:visible;
    align-items:flex-start;
    width:80mm;
  }
  .ticket-actions{display:none;}
  .ticket{
    box-shadow:none;
    width:80mm;
    max-width:80mm;
    clip-path:none;
    margin:0;
    padding:8px 10px;
    page-break-after:avoid;
    page-break-inside:avoid;
  }
}
</style>
</head>
<body>

<!-- ===================== PANTALLA DE ACCESO ===================== -->
<div id="login-screen">
  <img id="login-logo" src="" alt="">
  <div>
    <h1>Panel del propietario</h1>
    <p>Acceso restringido · Liam's Pizza Lab</p>
  </div>
  <form id="login-form">
    <input type="password" id="login-password" placeholder="Contraseña" autocomplete="off" required>
    <button type="submit">Entrar</button>
    <p id="login-error"></p>
  </form>
</div>

<!-- ===================== PANEL PRINCIPAL ===================== -->
<div id="panel-screen">
  <header class="admin-top">
    <div class="admin-brand">
      <img id="panel-logo" src="" alt="">
      <h1>Pedidos recientes</h1>
    </div>
    <div class="admin-actions">
      <button class="btn-ghost" id="btn-refresh">↻ Actualizar</button>
      <button class="btn-ghost" id="btn-logout">Cerrar sesión</button>
    </div>
  </header>
  <main class="admin-main">
    <p id="status-msg">Cargando pedidos…</p>
    <div class="order-list" id="order-list"></div>
  </main>
</div>

<!-- ===================== TICKET MODAL ===================== -->
<div class="overlay" id="ticket-overlay">
  <div class="ticket-wrap">
    <div class="ticket" id="ticket-content">
      <img class="t-logo" id="tk-logo" src="" alt="">
      <h3 class="t-brand" id="tk-brand">Liam's Pizza Lab</h3>
      <p class="t-sub" id="tk-sub">Dirección · Teléfono</p>
      <p class="t-num" id="tk-number">TICKET #000000</p>
      <div class="t-row"><span id="tk-date">Fecha</span><span id="tk-time">Hora</span></div>
      <div class="t-row"><span>Cliente</span><span id="tk-customer">—</span></div>
      <div class="t-row"><span>DNI</span><span id="tk-dni">—</span></div>
      <div class="t-row"><span>Teléfono</span><span id="tk-phone">—</span></div>
      <div class="t-row"><span id="tk-typelabel">Tipo</span><span id="tk-type">—</span></div>
      <div class="t-dots"></div>
      <div class="t-item-block" id="tk-items"></div>
      <div class="t-dots"></div>
      <div class="t-row"><span>Subtotal</span><span id="tk-subtotal">—</span></div>
      <div class="t-row" id="tk-delivery-row" style="display:none;"><span>Delivery</span><span id="tk-delivery">—</span></div>
      <div class="t-total"><span>TOTAL</span><span id="tk-total">—</span></div>
      <div class="t-row"><span>Pago</span><span id="tk-payment">—</span></div>
      <div class="t-row" id="tk-notes-row" style="display:none;"><span>Notas</span><span id="tk-notes">—</span></div>
      <p class="t-foot"><img src="" id="tk-mascot" alt="">¡Gracias por tu compra!<br>Vuelve pronto 🍕</p>
    </div>
    <div class="ticket-actions">
      <button class="btn-print" id="btn-print">Imprimir ticket</button>
      <button class="btn-close" id="btn-close-ticket">Cerrar</button>
    </div>
  </div>
</div>

document.getElementById("login-logo").src = IMG.logo_full;
document.getElementById("panel-logo").src = IMG.logo_full;
document.getElementById("tk-logo").src = IMG.logo_full;
document.getElementById("tk-mascot").src = IMG.mascota_cool;
document.getElementById("tk-brand").textContent = ADMIN_CONFIG.nombreNegocio;
document.getElementById("tk-sub").textContent = ADMIN_CONFIG.direccion + " · " + ADMIN_CONFIG.telefono;

function money(n){
  const num = parseFloat(n);
  return ADMIN_CONFIG.moneda + " " + (isNaN(num) ? "0.00" : num.toFixed(2));
}

// ---------- login (protección básica del lado del cliente) ----------
const SESSION_KEY = "liams_admin_session";
if (sessionStorage.getItem(SESSION_KEY) === "ok") {
  showPanel();
}

document.getElementById("login-form").addEventListener("submit", function(e){
  e.preventDefault();
  const pass = document.getElementById("login-password").value;
  if (pass === ADMIN_CONFIG.ownerPassword) {
    sessionStorage.setItem(SESSION_KEY, "ok");
    showPanel();
  } else {
    document.getElementById("login-error").textContent = "Contraseña incorrecta.";
  }
});

document.getElementById("btn-logout").onclick = function(){
  sessionStorage.removeItem(SESSION_KEY);
  document.getElementById("panel-screen").style.display = "none";
  document.getElementById("login-screen").style.display = "flex";
  document.getElementById("login-password").value = "";
};

function showPanel(){
  document.getElementById("login-screen").style.display = "none";
  document.getElementById("panel-screen").style.display = "block";
  cargarPedidos();
}

document.getElementById("btn-refresh").onclick = cargarPedidos;

// ---------- carga de pedidos vía JSONP (evita bloqueos de CORS) ----------
let lastOrders = [];

function cargarPedidos(){
  const statusMsg = document.getElementById("status-msg");
  const list = document.getElementById("order-list");
  statusMsg.textContent = "Cargando pedidos…";
  list.innerHTML = "";

  if (!ADMIN_CONFIG.googleSheetsURL || ADMIN_CONFIG.googleSheetsURL.indexOf("https://docs.google.com/spreadsheets/d/1TwVnWczeIT_c55AdQvBwaZhRh4Zjl-fhVYLwSKax5m8/edit?usp=sharing") === 0) {
    statusMsg.textContent = "Falta configurar la URL de Google Sheets en ADMIN_CONFIG.";
    return;
  }

  const callbackName = "liamsOrdersCallback_" + Date.now();
  window[callbackName] = function(data){
    delete window[callbackName];
    const oldScript = document.getElementById("jsonp-script");
    if (oldScript) oldScript.remove();

    if (data.error) {
      statusMsg.textContent = "No se pudo cargar: clave incorrecta o Apps Script no actualizado.";
      return;
    }
    lastOrders = data.orders || [];
    renderOrders(lastOrders);
  };

  const script = document.createElement("script");
  script.id = "jsonp-script";
  const url = ADMIN_CONFIG.googleSheetsURL +
    "?action=list&key=" + encodeURIComponent(ADMIN_CONFIG.apiSecret) +
    "&callback=" + callbackName;
  script.src = url;
  script.onerror = function(){
    statusMsg.textContent = "No se pudo conectar con Google Sheets. Revisa la URL y tu conexión.";
  };
  document.body.appendChild(script);
}

function renderOrders(orders){
  const statusMsg = document.getElementById("status-msg");
  const list = document.getElementById("order-list");

  if (!orders.length) {
    statusMsg.textContent = "";
    list.innerHTML = '<div class="empty-state">Todavía no hay pedidos registrados.</div>';
    return;
  }

  statusMsg.textContent = orders.length + " pedido(s) encontrados (más reciente primero).";

  list.innerHTML = orders.map((o, idx) => `
    <div class="order-card">
      <div class="order-info">
        <div class="order-top">
          <span class="order-ticket">#${o["N° Ticket"] || "—"}</span>
          <span class="order-type-badge">${o["Tipo de pedido"] || "—"}</span>
          <span class="order-time">${o["Fecha"] || ""} ${o["Hora"] || ""}</span>
        </div>
        <div class="order-customer">${o["Cliente"] || "—"}</div>
        <div class="order-detail">${(o["Detalle del pedido"] || "").split("|").join("<br>")}</div>
      </div>
      <div style="display:flex; align-items:center; gap:14px;">
        <div class="order-total">${money(o["Total"])}</div>
        <button class="btn-solid" data-idx="${idx}">Imprimir ticket</button>
      </div>
    </div>
  `).join("");

  list.querySelectorAll("button[data-idx]").forEach(btn=>{
    btn.onclick = () => mostrarTicketDesdeOrden(orders[btn.dataset.idx]);
  });
}

// ---------- ticket (reimpresión desde el panel) ----------
function mostrarTicketDesdeOrden(o){
  document.getElementById("tk-number").textContent = "TICKET #" + (o["N° Ticket"] || "");
  document.getElementById("tk-date").textContent = o["Fecha"] || "";
  document.getElementById("tk-time").textContent = o["Hora"] || "";
  document.getElementById("tk-customer").textContent = o["Cliente"] || "—";
  document.getElementById("tk-dni").textContent = o["DNI"] || "—";
  document.getElementById("tk-phone").textContent = o["Teléfono"] || "—";
  const esDelivery = (o["Tipo de pedido"] || "") === "Delivery";
  document.getElementById("tk-typelabel").textContent = esDelivery ? "Entrega" : "Tipo";
  document.getElementById("tk-type").textContent = esDelivery ? (o["Dirección"] || "—") : (o["Tipo de pedido"] || "—");

  const detalle = (o["Detalle del pedido"] || "").split("|").map(function(s){return s.trim();}).filter(Boolean).join("\n");
  document.getElementById("tk-items").textContent = detalle;

  document.getElementById("tk-subtotal").textContent = money(o["Subtotal"]);
  const deliveryRow = document.getElementById("tk-delivery-row");
  const deliveryVal = parseFloat(o["Delivery"]);
  if (!isNaN(deliveryVal) && deliveryVal > 0) {
    deliveryRow.style.display = "flex";
    document.getElementById("tk-delivery").textContent = money(o["Delivery"]);
  } else {
    deliveryRow.style.display = "none";
  }
  document.getElementById("tk-total").textContent = money(o["Total"]);
  document.getElementById("tk-payment").textContent = o["Método de pago"] || "—";

  const notesRow = document.getElementById("tk-notes-row");
  const notas = o["Notas"];
  if (notas && notas !== "—") {
    notesRow.style.display = "flex";
    document.getElementById("tk-notes").textContent = notas;
  } else {
    notesRow.style.display = "none";
  }

  document.getElementById("ticket-overlay").classList.add("show");
}

document.getElementById("btn-print").onclick = function(){ window.print(); };
document.getElementById("btn-close-ticket").onclick = function(){
  document.getElementById("ticket-overlay").classList.remove("show");
};
